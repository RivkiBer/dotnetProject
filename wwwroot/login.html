<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - Bakery</title>
    <link rel="stylesheet" href="css/site.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>🥐 Bakery Management</h1>
            <p>התחברות למערכת</p>
        </header>
        
        <div class="content">
            <div class="section">
                <form action="javascript:void(0);" onsubmit="login()">
                    <div style="width: 100%;">
                        <label for="name" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">שם משתמש:</label>
                        <input type="text" id="name" placeholder="הכנס שם משתמש" required>
                    </div>
                    <div style="width: 100%;">
                        <label for="pass" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">סיסמה:</label>
                        <input type="password" id="pass" placeholder="הכנס סיסמה" required>
                    </div>
                    <input type="submit" value="התחברות" style="width: 100%;">
                </form>
                <p id="message" style="margin-top: 15px; min-height: 20px;"></p>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const name = document.getElementById('name').value;
            const pass = document.getElementById('pass').value;
            const messageEl = document.getElementById('message');

            messageEl.textContent = '...';
            messageEl.className = '';

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ Name: name, Pass: pass })
            })
            .then(response => {
                if (response.ok) {
                    return response.text();
                } else {
                    throw new Error('שם משתמש או סיסמה שגויים');
                }
            })
            .then(token => {
                localStorage.setItem('token', token);
                messageEl.textContent = 'התחברות הצליחה! מעביר אותך...';
                messageEl.className = 'success';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            })
            .catch(error => {
                messageEl.textContent = '❌ ' + error.message;
                messageEl.className = 'error';
            });
        }

        // בדיקה אם כבר מחובר
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('token')) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
