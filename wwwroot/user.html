<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול משתמשים</title>
    <link rel="stylesheet" href="css/site.css" />
</head>

<body>
    <div class="container">
        <header>
            <h1>👥 ניהול משתמשים</h1>
            <p id="userTitle" style="margin: 0; font-size: 1.1em; opacity: 0.9;">⏳ בודק הרשאות...</p>
        </header>

        <div class="content">
            <!-- ADMIN VIEW -->
            <div id="adminSection" style="display: none;">
                <div class="section">
                    <h3>➕ הוסף משתמש חדש</h3>
                    <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
                        <input type="text" id="add-name" placeholder="שם משתמש" required>
                        <input type="password" id="add-pass" placeholder="סיסמה" required>
                        <select id="add-type">
                            <option value="Regular">👤 משתמש רגיל</option>
                            <option value="Admin">👨‍💼 מנהל</option>
                        </select>
                        <input type="submit" value="➕ הוסף">
                    </form>
                </div>

                <div id="editForm" style="display: none;">
                    <h3>✏️ עדכן משתמש</h3>
                    <form action="javascript:void(0);" onsubmit="updateItem()">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="edit-name" placeholder="שם משתמש" required>
                        <select id="edit-type">
                            <option value="Regular">👤 משתמש רגיל</option>
                            <option value="Admin">👨‍💼 מנהל</option>
                        </select>
                        <input type="submit" value="💾 שמור">
                        <button type="button" onclick="closeInput()" style="background: #999;">❌ ביטול</button>
                    </form>
                </div>

                <div class="section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0;">👥 רשימת כל המשתמשים</h3>
                        <p id="counter" style="font-size: 1.2em; color: #667eea; font-weight: 600; margin: 0;">📊 סה"כ: 0</p>
                    </div>

                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>🆔 ID</th>
                                    <th>👤 שם</th>
                                    <th>🔑 סיסמה</th>
                                    <th>👨 סוג</th>
                                    <th colspan="2">⚙️ פעולות</th>
                                </tr>
                            </thead>
                            <tbody id="User"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- REGULAR USER VIEW -->
            <div id="userSection" style="display: none;">
                <div class="section">
                    <h3>👤 הפרופיל שלי</h3>
                    <div id="myProfile" style="padding: 20px; background: linear-gradient(135deg, #f0f4ff 0%, #f8f9fa 100%); border-radius: 8px; border-left: 4px solid #667eea;"></div>
                </div>

                <div id="editFormUser" style="display: none;">
                    <h3>✏️ עדכן הפרופיל שלי</h3>
                    <form action="javascript:void(0);" onsubmit="updateMyProfile()">
                        <input type="text" id="edit-my-name" placeholder="שם משתמש" required>
                        <input type="submit" value="💾 שמור">
                        <button type="button" onclick="closeMyEditForm()" style="background: #999;">❌ ביטול</button>
                    </form>
                </div>
            </div>

            <div id="errorMessage" style="display: none;"></div>
        </div>

        <footer>
            <a href="index.html">🥐 חזור לתפריט המאפים</a>
            <a href="#" onclick="logout()" class="logout-link">🚪 התנתקות</a>
        </footer>
    </div>

    <script src="js/user.js" asp-append-version="true"></script>
</body>

</html>
