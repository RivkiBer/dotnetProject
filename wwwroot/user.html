<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link rel="stylesheet" href="css/site.css" />
</head>

<body>
    <h1>User Management</h1>

    <div id="userSection">
        <h3>Add User</h3>
        <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
            <input type="text" id="add-name" placeholder="Name" required>
            <input type="password" id="add-pass" placeholder="Password" required>
            <select id="add-type">
                <option value="Regular">Regular</option>
                <option value="Admin">Admin</option>
            </select>
            <input type="submit" value="Add">
        </form>

        <div id="editForm">
            <h3>Edit</h3>
            <form action="javascript:void(0);" onsubmit="updateItem()">
                <input type="hidden" id="edit-id">
                <input type="text" id="edit-name" placeholder="Name" required>
                <input type="password" id="edit-pass" placeholder="Password" required>
                <select id="edit-type">
                    <option value="Regular">Regular</option>
                    <option value="Admin">Admin</option>
                </select>
                <input type="submit" value="Save">
                <a onclick="closeInput()" aria-label="Close">&#10006;</a>
            </form>
        </div>

        <p id="counter"></p>

        <table>
            <tr>
                <th>Type</th>
                <th>Name</th>
                <th></th>
                <th></th>
            </tr>
            <tbody id="User"></tbody>
        </table>
        <a href="index.html">למעבר לתפריט המאפים-></a>
        <br>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <script src="js/user.js" asp-append-version="true"></script>
</body>

</html>
