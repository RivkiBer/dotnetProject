<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakery - ניהול המאפים</title>
    <link rel="stylesheet" href="css/site.css" />
</head>

<body>
    <div class="container">
        <header>
            <h1>🥐 Bakery Management</h1>
            <p>ניהול תפריט המאפים</p>
        </header>

        <div id="messagesContainer" style="display: none; margin-bottom: 20px;"></div>

        <div class="content">
            <div class="section">
                <h3>➕ הוסף מאפה חדש</h3>
                <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
                    <input type="text" id="add-name" placeholder="שם המאפה" required>
                    <label style="display: flex; align-items: center; flex: 1; min-width: 200px;">
                        <input type="checkbox" id="add-isMilky" style="width: auto; margin-right: 8px;">
                        <span>מאפה חלבי</span>
                    </label>
                    <input type="submit" value="הוסף">
                </form>
            </div>

            <div id="editForm">
                <h3>✏️ עדכן מאפה</h3>
                <form action="javascript:void(0);" onsubmit="updateItem()">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="edit-name" placeholder="שם המאפה" required>
                    <label style="display: flex; align-items: center; flex: 1; min-width: 200px;">
                        <input type="checkbox" id="edit-isMilky" style="width: auto; margin-right: 8px;">
                        <span>מאפה חלבי</span>
                    </label>
                    <input type="submit" value="שמור">
                    <button type="button" onclick="closeInput()" style="background: #999;">ביטול</button>
                </form>
            </div>

            <p id="counter"></p>

            <table>
                <tr>
                    <th>חלבי?</th>
                    <th>שם המאפה</th>
                    <th colspan="2">פעולות</th>
                </tr>
                <tbody id="Pastry"></tbody>
            </table>
        </div>

        <footer>
            <a href="user.html">👤 הפרופיל שלי</a>
            <a id="usersLink" href="user.html" style="display: none;">👥 ניהול משתמשים</a>
            <a href="#" onclick="logout()" class="logout-link">🚪 התנתקות</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>
    <script src="js/site.js" asp-append-version="true"></script>
    <script>
        // הצג קישור לניהול משתמשים רק ל-Admin
        function checkIfAdmin() {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const tokenParts = token.split('.');
                    const decodedHeader = atob(tokenParts[0]);
                    const decodedPayload = atob(tokenParts[1]);
                    const payload = JSON.parse(decodedPayload);
                    
                    if (payload.type === 'Admin') {
                        document.getElementById('usersLink').style.display = 'inline-block';
                    }
                } catch (error) {
                    console.error('Error checking admin status:', error);
                }
            }
        }
        checkIfAdmin();
    </script>
</body>

</html>
